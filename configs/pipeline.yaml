# Pipeline Configuration
# Use: kg-gen run -c configs/pipeline.yaml

pipeline:
  language: en                     # en | vi
  graph_backend: networkx          # networkx | neo4j

  # Input sources
  input_paths:
    - data/sample/

  file_formats:
    - jsonl
    - txt
    - json
    - csv

  # Deduplication
  dedup_method: minhash            # minhash | simhash | ngram
  dedup_threshold: 0.85

  # Entity and relationship extraction
  spacy_model: en_core_web_lg
  use_llm: false                    # true = GraphGen-style joint DeepSeek extraction
  llm_model: deepseek-v4-pro        # use deepseek-v4-flash for cheaper experiments
  graphgen_max_gleanings: 3         # Figure 8 iterative missed-entity checks
  graphgen_entity_types:
    - concept
    - date
    - location
    - keyword
    - organization
    - person
    - event
    - work
    - nature
    - artificial
    - science
    - technology
    - mission
    - gene

  # Entity resolution
  resolve_method: string        # string | embedding
  resolve_threshold: 0.85

  # Neo4j connection — configured via NEO4J_URI / NEO4J_USER / NEO4J_PASSWORD in .env only

  # Export
  export_formats:
    - json
    - graphml
    - neo4j_csv
