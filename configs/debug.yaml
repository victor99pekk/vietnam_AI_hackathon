# Debug Pipeline Configuration — fast run with small data
# Use: kg-gen run -c configs/debug.yaml

pipeline:
  language: en
  graph_backend: networkx

  # Input sources — debugg_sample only
  input_paths:
    - data/debugg_sample/

  file_formats:
    - txt

  # Deduplication — lower threshold to test dedup logic
  dedup_method: ngram
  dedup_threshold: 0.9

  # Entity extraction — small model for speed
  spacy_model: en_core_web_sm
  use_llm: false
  llm_model: deepseek-v4-pro
  graphgen_max_gleanings: 3

  # Entity resolution — string similarity (no model download)
  resolve_method: string_similarity
  resolve_threshold: 0.85

  # Export
  export_formats:
    - json
    - graphml
