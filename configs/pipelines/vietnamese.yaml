# Vietnamese KG pipeline — optimized for best extraction quality.
#
# Fast path (no LLM):  kg-gen run -c configs/pipelines/vietnamese.yaml --no-llm
# Full quality path:   kg-gen run -c configs/pipelines/vietnamese.yaml
# Add to Neo4j:        kg-gen run ... && kg-gen neo4j-upload -o generated_KGs/output_vi

pipeline:
  language: vi
  graph_backend: networkx

  input_paths:
    - data/debugg_sample_vi/
  file_formats:
    - jsonl

  # ── Chunking ──────────────────────────────────────────
  # Vietnamese words are short (avg 1-2 syllables). Bump token target so
  # chunks carry enough semantic context for relation extraction.
  chunking:
    method: sentence
    target_tokens: 600
    overlap_tokens: 80

  # ── Quality ───────────────────────────────────────────
  quality:
    method: heuristic

  # ── Deduplication ─────────────────────────────────────
  # Lower thresholds than English — Vietnamese diacritics (dấu) create
  # surface variance that should NOT count as different documents.
  # Layered: exact hash → MinHash → semantic (BGE-M3, best multilingual).
  deduplication:
    document_method: layered
    document_threshold: 0.80
    chunk_method: minhash
    chunk_threshold: 0.80
    semantic_threshold: 0.88
    embedding_model: BAAI/bge-m3

  # ── Extraction ────────────────────────────────────────
  # GraphGen (DeepSeek) is the only reliable option for Vietnamese NER.
  # 3 gleanings catches entities missed in the first pass.
  extraction:
    method: graphgen
    model: deepseek-v4-pro
    max_gleanings: 3
    entity_types:
      - concept
      - date
      - location
      - keyword
      - organization
      - person
      - event
      - work
      - nature
      - artificial
      - science
      - technology
      - mission
      - gene

  # ── Entity Resolution ─────────────────────────────────
  # Embedding-based — handles Vietnamese name variations with diacritics
  # better than string similarity (e.g., "Nguyễn Văn A" ≈ "Nguyen Van A").
  resolution:
    method: embedding
    threshold: 0.85
    embedding_model: paraphrase-multilingual-MiniLM-L12-v2

  # ── Export ────────────────────────────────────────────
  export_formats:
    - json
    - graphml
    - neo4j_csv

