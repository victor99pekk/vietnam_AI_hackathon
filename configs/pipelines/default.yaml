# Pipeline Configuration
# Use: kg-gen run -c configs/pipelines/default.yaml

pipeline:
  language: en                     # en | vi
  graph_backend: networkx          # networkx | neo4j

  # Input sources
  input_paths:
    - data/sample/

  file_formats:
    - jsonl
    - txt
    - json
    - csv

  # The same strategies are available for English and Vietnamese.
  chunking:
    method: sentence                # none | fixed | sentence | semantic
    target_tokens: 450
    overlap_tokens: 60
  quality:
    method: heuristic               # none | heuristic
  deduplication:
    document_method: minhash        # none | exact | minhash | simhash | ngram | semantic | layered
    document_threshold: 0.85
    chunk_method: minhash
    chunk_threshold: 0.85
    semantic_threshold: 0.92

  # Entity and relationship extraction
  extraction:
    method: offline                 # offline | graphgen
    spacy_model: en_core_web_lg
    model: deepseek-v4-pro          # use deepseek-v4-flash for cheaper experiments
    max_gleanings: 3
    entity_types:
      - concept
      - date
      - location
      - keyword
      - organization
      - person
      - event
      - work
      - nature
      - artificial
      - science
      - technology
      - mission
      - gene

  # Entity resolution
  resolution:
    method: string                  # string | embedding
    threshold: 0.85

  # Neo4j connection — configured via NEO4J_URI / NEO4J_USER / NEO4J_PASSWORD in .env only

  # MongoDB document archive (leave empty to disable)
  mongo_uri: "mongodb://localhost:27017"
  mongo_database: "kg_documents"

  # Export
  export_formats:
    - json
    - graphml
    - neo4j_csv
