# Vietnamese core KG pipeline.
# GraphGen quality path: kg-gen run -c configs/vietnamese.yaml
# Offline path:          kg-gen run -c configs/vietnamese.yaml --no-llm

pipeline:
  language: vi
  graph_backend: networkx

  input_paths:
    - data/debugg_sample_vi/
  file_formats:
    - jsonl

  # Balanced demo defaults. Override methods from the CLI or use the fast and
  # quality presets next to this file.
  chunking:
    method: sentence              # none | fixed | sentence | semantic
    target_tokens: 450
    overlap_tokens: 60

  quality:
    method: heuristic             # none | heuristic

  deduplication:
    document_method: minhash      # none | exact | minhash | simhash | ngram | semantic | layered
    document_threshold: 0.85
    chunk_method: minhash
    chunk_threshold: 0.85
    semantic_threshold: 0.92
    embedding_model: paraphrase-multilingual-MiniLM-L12-v2

  extraction:
    method: graphgen              # offline | graphgen
    model: deepseek-v4-pro
    max_gleanings: 3
    entity_types:
      - concept
      - date
      - location
      - keyword
      - organization
      - person
      - event
      - work
      - nature
      - artificial
      - science
      - technology
      - mission
      - gene

  resolution:
    method: string                # string | embedding
    threshold: 0.85

  export_formats:
    - json
    - graphml
    - neo4j_csv
