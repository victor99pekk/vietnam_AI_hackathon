# KG Evaluation Pipeline Configuration
# Used by: scripts/run_eval.py --method 1|2|all

# ── Common settings ───────────────────────────────────────────
common:
  seed: 42
  output_dir: output_eval

# ── Method 1: SFT Data Quality Assessment ────────────────────
method1:
  # Step 1.1 — Structural Audit
  structural_audit:
    # Entity duplication: threshold for cosine similarity to flag as potential duplicate
    entity_dedup_threshold: 0.85
    # Schema compliance: path to ontology YAML (uses default_ontology.yaml if null)
    ontology_path: null

  # Step 1.2 — SFT Data Generation
  sft_generation:
    # Number of subgraph samples to draw from the KG
    num_samples: 50
    # Mix of hop depths: [1-hop%, 2-hop%, 3-hop%]
    hop_distribution: [0.3, 0.4, 0.3]
    # LLM model for generating instruction/response pairs
    llm_model: deepseek-chat
    # LLM provider (openai-compatible API)
    llm_provider: deepseek
    # Max tokens for generated SFT pairs
    max_tokens: 512
    # Temperature for generation diversity
    temperature: 0.7

  # Step 1.3 — SFT Quality Evaluation (deepeval)
  sft_evaluation:
    # deepeval thresholds
    faithfulness_threshold: 0.7
    relevancy_threshold: 0.7
    # Model used as the judge (uses same LLM as generation by default)
    judge_model: deepseek-chat
    # Semantic diversity: minimum unique n-gram ratio (0-1) before flagging
    min_diversity_score: 0.4

  # Step 1.4 — Source Document Fact Coverage
  coverage:
    # Set to false to skip this step
    enabled: true
    # How to extract facts: "heuristic" (regex, no API) or "llm" (future)
    extraction_mode: heuristic
    # Max number of unique facts to sample from the source documents
    fact_sample_size: 30
    # Paths to source documents (directories or individual files)
    document_paths:
      - data/

# ── Method 2: Fine-Tuning Ablation Study ─────────────────────
method2:
  # Model to fine-tune
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  # Alternatives: Qwen/Qwen2.5-1.5B-Instruct, Qwen/Qwen2.5-7B-Instruct

  # LoRA configuration
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

  # Training hyperparameters
  training:
    max_seq_length: 1024
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    learning_rate: 1.0e-4
    max_steps: -1           # Epoch-based training; do not force unequal step counts
    num_train_epochs: 3
    warmup_steps: 0
    warmup_ratio: 0.05
    logging_steps: 10
    save_steps: 100
    eval_steps: 100
    weight_decay: 0.01
    lr_scheduler_type: cosine
    optim: adamw_8bit
    fp16: false             # Mac MPS doesn't support fp16; use bf16=false
    bf16: false

  # Dataset generation
  dataset_gen:
    # Language for QA templates: "en" | "vi"
    language: en
    test_split: 0.2
    max_hops: 3
    max_triples: 2000
    max_paths_per_start: 20
    max_pairs: 10000
    # Match final B/C training files by estimated question+answer tokens.
    match_token_volume: true

  # Evaluation
  benchmark:
    # Number of test QA pairs to evaluate on
    max_test_samples: 50
    # Metrics to compute
    metrics:
      - factual_accuracy
      - multi_hop_accuracy
      - hallucination_rate
      - consistency
      - perplexity

# ── GraphGen-style experiment ────────────────────────────────
# Invoked explicitly with --method graphgen. It is not included in `all`, so
# existing evaluation behaviour and API cost remain unchanged.
graphgen:
  subgraphs:
    max_depth: 2
    max_premise_tokens: 256
    max_extra_edges: 5
    edge_sampling: max_loss
    bidirectional: true
    max_subgraphs: 50
  qa_generation:
    model: deepseek-v4-pro
    provider: deepseek
    language: English
    temperature: 0.2
    max_tokens: 512
    max_questions: 20
